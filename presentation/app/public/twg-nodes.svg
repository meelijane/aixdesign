<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <rect width="800" height="800" fill="#000000"/>
  <!-- edges first -->
  <g stroke="#ffffff" stroke-width="2.5" fill="none" opacity="0.85">
    <line x1="400" y1="400" x2="180" y2="160"/>
    <line x1="400" y1="400" x2="620" y2="160"/>
    <line x1="400" y1="400" x2="120" y2="400"/>
    <line x1="400" y1="400" x2="680" y2="400"/>
    <line x1="400" y1="400" x2="180" y2="640"/>
    <line x1="400" y1="400" x2="620" y2="640"/>
    <line x1="400" y1="400" x2="400" y2="120"/>
    <line x1="400" y1="400" x2="400" y2="680"/>
    <line x1="180" y1="160" x2="400" y2="120"/>
    <line x1="620" y1="160" x2="400" y2="120"/>
    <line x1="180" y1="160" x2="120" y2="400"/>
    <line x1="620" y1="160" x2="680" y2="400"/>
    <line x1="120" y1="400" x2="180" y2="640"/>
    <line x1="680" y1="400" x2="620" y2="640"/>
    <line x1="180" y1="640" x2="400" y2="680"/>
    <line x1="620" y1="640" x2="400" y2="680"/>
    <line x1="180" y1="160" x2="620" y2="640"/>
    <line x1="620" y1="160" x2="180" y2="640"/>
  </g>
  <!-- outer nodes as filled rounded squares -->
  <g fill="#ffffff">
    <rect x="155" y="135" width="50" height="50" rx="6"/>
    <rect x="595" y="135" width="50" height="50" rx="6"/>
    <rect x="95"  y="375" width="50" height="50" rx="6"/>
    <rect x="655" y="375" width="50" height="50" rx="6"/>
    <rect x="155" y="615" width="50" height="50" rx="6"/>
    <rect x="595" y="615" width="50" height="50" rx="6"/>
    <rect x="375" y="95"  width="50" height="50" rx="6"/>
    <rect x="375" y="655" width="50" height="50" rx="6"/>
  </g>
  <!-- center node — larger, accented -->
  <rect x="360" y="360" width="80" height="80" rx="10" fill="#ffffff"/>
</svg>
