<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Speaker Notes — AI Frontier</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d0d14;
      --fg:      #e8e8f0;
      --dim:     #555570;
      --accent1: #ff4dff;
      --accent2: #4dffd2;
      --accent3: #ffd24d;
      --mono: 'Space Mono', monospace;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--mono);
      overflow: hidden;
    }

    #container {
      display: grid;
      grid-template-rows: auto 1fr auto;
      height: 100vh;
      padding: 2rem;
      gap: 1.5rem;
    }

    /* ── Header ─────────────────────────────────────────────── */
    #header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #222235;
      padding-bottom: 1rem;
    }
    #slide-info {
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      color: var(--accent1);
      text-transform: uppercase;
    }
    #timer {
      font-size: 2.5rem;
      font-weight: 300;
      color: var(--fg);
      letter-spacing: -0.02em;
    }
    #timer.warning { color: var(--accent3); }
    #timer.danger  { color: #ff4444; }

    /* ── Notes area ─────────────────────────────────────────── */
    #notes-body {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      overflow-y: auto;
      min-height: 0;
    }
    #preview-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      min-height: 0;
    }
    #preview-wrap {
      position: relative;
      aspect-ratio: 16 / 10;
      border: 1px solid #333;
      border-radius: 4px;
      overflow: hidden;
      background: #000;
    }
    #preview-frame {
      position: absolute;
      top: 0; left: 0;
      width: 1920px;
      height: 1200px;
      transform-origin: top left;
      transform: scale(0.25);
      border: none;
      pointer-events: none;
    }
    #notes-col {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      overflow-y: auto;
    }

    #slide-label {
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      color: var(--dim);
      text-transform: uppercase;
    }

    #slide-title {
      font-size: clamp(1.4rem, 3vw, 2.2rem);
      font-weight: 400;
      line-height: 1.2;
      color: var(--fg);
    }
    #slide-title em { font-style: italic; color: var(--accent1); }

    #slide-content {
      font-size: clamp(1.1rem, 2vw, 1.6rem);
      line-height: 1.5;
      color: var(--accent2);
      max-width: 72ch;
    }
    #slide-content ul {
      list-style: none;
      padding: 0;
    }
    #slide-content li {
      padding: 4px 0;
    }
    #slide-content li::before {
      content: "→ ";
      color: var(--dim);
    }
    #notes-divider {
      border-top: 1px solid #222235;
      margin: 0.5rem 0;
    }
    #notes-heading {
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      color: var(--dim);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }
    #notes-list {
      font-size: clamp(1.1rem, 2vw, 1.5rem);
      font-weight: 300;
      line-height: 1.7;
      color: var(--fg);
      max-width: 72ch;
      list-style: none;
      padding: 0;
    }
    #notes-list li {
      padding: 4px 0;
    }
    #notes-list li::before {
      content: "• ";
      color: var(--accent1);
    }

    /* ── Next slide preview ─────────────────────────────────── */
    #next-section {
      border-top: 1px solid #222235;
      padding-top: 1rem;
    }
    #next-label {
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      color: var(--dim);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }
    #next-title {
      font-size: 1.1rem;
      color: var(--accent2);
    }

    /* ── Progress bar ───────────────────────────────────────── */
    #progress-bar {
      height: 3px;
      background: #222235;
      border-radius: 2px;
      overflow: hidden;
      margin-top: 1rem;
    }
    #progress-fill {
      height: 100%;
      background: var(--accent1);
      transition: width 0.4s ease;
    }

    /* ── Disconnected state ─────────────────────────────────── */
    #waiting {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 1.5rem;
      color: var(--dim);
      font-size: 0.9rem;
      letter-spacing: 0.1em;
    }
    #waiting .blink {
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }
  </style>
</head>
<body>

<div id="waiting">
  <div style="font-size:1.4rem; color: var(--accent1);">// SPEAKER NOTES</div>
  <div>Open the presentation window to begin</div>
  <div class="blink">▋</div>
</div>

<div id="container" style="display:none">
  <div id="header">
    <div id="slide-info">Slide <span id="cur">—</span> of <span id="total">—</span></div>
    <div id="timer">00:00</div>
  </div>

  <div id="notes-body">
    <div id="preview-row">
      <div id="preview-wrap">
        <iframe id="preview-frame" src="/?presenter=1" scrolling="no"></iframe>
      </div>
      <div id="notes-col">
        <div id="slide-label"></div>
        <div id="slide-title"></div>
        <div id="slide-content"></div>
        <div id="notes-divider"></div>
        <div id="notes-heading">// TALKING POINTS</div>
        <ul id="notes-list"></ul>
      </div>
    </div>
  </div>

  <div>
    <div id="next-section">
      <div id="next-label">// NEXT SLIDE</div>
      <div id="next-title"></div>
    </div>
    <div id="progress-bar"><div id="progress-fill"></div></div>
  </div>
</div>

<script>
  // ── State ──────────────────────────────────────────────────
  let startTime = null;
  let timerInterval = null;

  const $waiting   = document.getElementById('waiting');
  const $container = document.getElementById('container');
  const $cur       = document.getElementById('cur');
  const $total     = document.getElementById('total');
  const $timer     = document.getElementById('timer');
  const $label     = document.getElementById('slide-label');
  const $title     = document.getElementById('slide-title');
  const $content   = document.getElementById('slide-content');
  const $notesList = document.getElementById('notes-list');
  const $nextTitle = document.getElementById('next-title');
  const $fill      = document.getElementById('progress-fill');

  // ── Timer ──────────────────────────────────────────────────
  function startTimer() {
    if (startTime) return;
    startTime = Date.now();
    timerInterval = setInterval(updateTimer, 1000);
  }

  function updateTimer() {
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    const mins = String(Math.floor(elapsed / 60)).padStart(2, '0');
    const secs = String(elapsed % 60).padStart(2, '0');
    $timer.textContent = `${mins}:${secs}`;

    // 20min warning, 25min danger
    if (elapsed >= 25 * 60)      $timer.className = 'danger';
    else if (elapsed >= 20 * 60) $timer.className = 'warning';
    else                          $timer.className = '';
  }

  // ── Receive state from main window via localStorage ────────
  function handleState(state) {
    $waiting.style.display   = 'none';
    $container.style.display = 'grid';

    startTimer();

    const idx   = state.current;
    const total = state.total;
    const slide = state.slides[idx];
    const next  = state.slides[idx + 1];

    $cur.textContent   = idx + 1;
    $total.textContent = total;

    // Label
    const lbl = slide.label;
    $label.textContent = lbl ? `${lbl.num} · ${lbl.text}` : '';

    // Title — pull from content
    const c = slide.content || {};
    const titleText = c.title || c.heading || c.quote || c.label || slide.type;
    $title.innerHTML = titleText || '';

    // Slide content (bullets/body)
    const bullets = c.bullets || c.body || [];
    if (Array.isArray(bullets) && bullets.length) {
      $content.innerHTML = '<ul>' + bullets.map(b => `<li>${b}</li>`).join('') + '</ul>';
    } else if (typeof bullets === 'string') {
      $content.textContent = bullets;
    } else {
      $content.textContent = '';
    }

    // Notes as dot points
    const notesText = slide.notes || '';
    if (notesText) {
      const points = notesText.split(/[.!?]\s+/).filter(s => s.trim());
      if (points.length > 1) {
        $notesList.innerHTML = points.map(p => `<li>${p.trim()}</li>`).join('');
      } else {
        $notesList.innerHTML = `<li>${notesText}</li>`;
      }
    } else {
      $notesList.innerHTML = '<li>—</li>';
    }

    // Next slide
    if (next) {
      const nc = next.content || {};
      $nextTitle.innerHTML = nc.title || nc.heading || nc.quote || next.type || '—';
    } else {
      $nextTitle.textContent = '[ End of presentation ]';
    }

    // Progress
    const pct = ((idx + 1) / total) * 100;
    $fill.style.width = pct + '%';

    // Sync preview iframe
    syncPreview(idx);
    scalePreview();
  }

  // ── Listen for storage events ───────────────────────────────
  window.addEventListener('storage', (e) => {
    if (e.key === 'presentation-state') {
      try {
        const state = JSON.parse(e.newValue);
        handleState(state);
      } catch {}
    }
  });

  // ── Send navigation commands back to the main window ────────
  document.addEventListener('keydown', (e) => {
    let cmd = null;
    if (e.key === 'ArrowRight' || e.key === ' ') cmd = 'advance';
    else if (e.key === 'ArrowLeft') cmd = 'retreat';
    else if (e.key === 'm' || e.key === 'M') cmd = 'toggle-modal';
    if (cmd) {
      e.preventDefault();
      localStorage.setItem('presentation-command', JSON.stringify({ cmd, ts: Date.now() }));
    }
  });

  // ── Scale the preview iframe to fit its container ────────
  const $preview = document.getElementById('preview-frame');
  const $previewWrap = document.getElementById('preview-wrap');
  function scalePreview() {
    if (!$previewWrap || !$preview) return;
    const wrapW = $previewWrap.clientWidth;
    const scale = wrapW / 1920;
    $preview.style.transform = `scale(${scale})`;
    $preview.style.height = `${1200}px`;
    $previewWrap.style.height = `${1200 * scale}px`;
  }
  window.addEventListener('resize', scalePreview);
  setTimeout(scalePreview, 100);

  // ── Sync iframe to current slide via hash ───────────────
  function syncPreview(idx) {
    if ($preview && $preview.contentWindow) {
      $preview.contentWindow.location.hash = String(idx);
    }
  }

  // Also poll in case we missed the initial event
  setInterval(() => {
    const raw = localStorage.getItem('presentation-state');
    if (raw) {
      try {
        const state = JSON.parse(raw);
        // Only update if something changed
        const newIdx = state.current;
        const curIdx = parseInt($cur.textContent) - 1;
        if (isNaN(curIdx) || newIdx !== curIdx) {
          handleState(state);
        }
      } catch {}
    }
  }, 500);
</script>
</body>
</html>
